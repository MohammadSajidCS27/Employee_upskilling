<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil erstellen | Siemens ID</title>
    <link rel="shortcut icon" href="https://cdn.login.siemens.com/public/favicon_16x16.ico">
    <link rel="stylesheet" href="https://cdn.auth0.com/ulp/react-components/1.192.0/css/main_wcag_compliant.cdn.min.css">
    <style>
        :root {
            --primary-color: #0CC;
            --button-font-color: #000028;
            --secondary-button-border-color: #0CC;
            --social-button-border-color: #0CC;
            --radio-button-border-color: #0CC;
            --secondary-button-text-color: #0CC;
            --link-color: #0CC;
            --title-font-color: #FFF;
            --font-default-color: #FFF;
            --widget-background-color: #23233C;
            --box-border-color: #23233C;
            --font-light-color: #B3B3BE;
            --input-text-color: #FFF;
            --input-border-color: #B3B3BE;
            --border-default-color: #B3B3BE;
            --input-background-color: #00183B;
            --icon-default-color: #B3B3BE;
            --error-color: #FF7687;
            --error-text-color: #000000;
            --success-color: #13a688;
            --base-focus-color: #B3B3BE;
            --transparency-focus-color: rgba(179,179,190, 0.15);
            --base-hover-color: #000028;
            --transparency-hover-color: rgba(0,0,40, var(--hover-transparency-value));
            --button-border-width: 1px;
            --social-button-border-width: 1px;
            --radio-border-width: 1px;
            --button-border-radius: 0px;
            --radio-border-radius: 0px;
            --input-border-width: 1px;
            --input-border-radius: 2px;
            --border-radius: 2px;
            --border-radius-outer: 2px;
            --box-border-width: 0px;
            --shadow-component-outer: none;
            --header-title-spacing: 0;
            --logo-height: 1px;
            --header-alignment: left;
            --ulp-label-font-size: 0.855rem;
            --ulp-label-font-weight: 400;
            --font-family: -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
        }
        @font-face {
            font-family: 'ULP Custom';
            font-style: normal;
            font-weight: 400;
            src: local('ULP Custom'), url('https://cdn.login.siemens.com/public/fonts/SiemensSans_Prof_Roman.woff') format('woff');
        }
        body {
            font-family: 'ULP Custom', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background-color: #000028;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .main-layout {
            display: flex;
            flex-direction: column;
            justify-content: center;
            flex-grow: 1;
            padding: 2vh;
        }
        .prompt-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .prompt-box-outer {
            background-color: #FFFFFF;
            border-radius: 0px;
            box-shadow: none;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        .prompt-title {
            color: #000028;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: left;
        }
        .prompt-subtitle {
            color: #666666;
            font-size: 0.9rem;
            margin-bottom: 24px;
            text-align: left;
            font-weight: 400;
        }
        .input-wrapper {
            margin-bottom: 20px;
            position: relative;
        }
        .input-wrapper label {
            display: block;
            color: #0CC;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 6px;
            text-transform: capitalize;
        }
        .input-wrapper input,
        .input-wrapper textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #B3B3BE;
            border-radius: 2px;
            background-color: #00183B;
            color: #FFFFFF;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            font-family: inherit;
        }
        .input-wrapper input:focus,
        .input-wrapper textarea:focus {
            border-color: #0CC;
            box-shadow: 0 0 0 1px #0CC;
        }
        .input-wrapper input::placeholder,
        .input-wrapper textarea::placeholder {
            color: #B3B3BE;
        }
        .input-wrapper textarea {
            resize: vertical;
            min-height: 80px;
        }
        ._button-login-id {
            width: 100%;
            padding: 14px;
            background-color: #0CC;
            color: #000028;
            border: 1px solid #0CC;
            border-radius: 2px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.2s;
        }
        ._button-login-id:hover {
            background-color: #00AAAA;
            border-color: #00AAAA;
        }
        ._button-login-id:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .ulp-alternate-action {
            text-align: center;
            margin-top: 16px;
        }
        .ulp-alternate-action a {
            color: #0CC;
            text-decoration: none;
            font-size: 0.9rem;
            margin: 0 8px;
        }
        .ulp-alternate-action a:hover {
            text-decoration: underline;
        }
        .error-message {
            color: #FF7687;
            font-size: 0.85rem;
            margin-top: 8px;
            text-align: left;
            display: none;
        }
        .success-message {
            color: #13a688;
            font-size: 0.85rem;
            margin-top: 8px;
            text-align: left;
            display: none;
        }
        .footer {
            background-color: #000028;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .footerLinks {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .footerLinks a {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 0.75rem;
            opacity: 0.8;
        }
        .footerLinks a:hover {
            color: #0CC;
            opacity: 1;
        }
        .footerInfo {
            font-size: 0.75rem;
            color: #FFFFFF;
            opacity: 0.8;
        }
        .siemens-navbar {
            background-color: #000028;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .siemens-navbar a {
            color: #FFFFFF;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .siemens-navbar a:hover {
            color: #0CC;
        }
        .siemens-logo {
            height: 24px;
            width: auto;
        }
        .siemens-navbar-links {
            display: flex;
            gap: 24px;
        }
        .siemens-navbar-links a {
            font-size: 0.85rem;
            opacity: 0.9;
        }
        .siemens-navbar-links a:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <nav class="siemens-navbar">
        <a href="https://www.siemens.com/global/en/home.html" target="_blank">
            <svg class="siemens-logo" viewBox="0 0 200 50" fill="currentColor">
                <text x="0" y="35" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#FFFFFF">siemens</text>
            </svg>
        </a>
        <div class="siemens-navbar-links">
            <a href="https://www.siemens.com/global/en/home.html" target="_blank">Home</a>
            <a href="https://www.siemens.com/global/en/company.html" target="_blank">Company</a>
            <a href="https://www.siemens.com/global/en/products.html" target="_blank">Products</a>
            <a href="https://www.siemens.com/global/en/services.html" target="_blank">Services</a>
            <a href="https://www.siemens.com/global/en/about.html" target="_blank">About</a>
            <a href="https://www.siemens.com/global/en/careers.html" target="_blank">Careers</a>
        </div>
    </nav>

    <div class="main-layout">
        <div class="prompt-wrapper">
            <div class="prompt-box-outer" id="prompt-box">
                <h1 class="prompt-title">Complete Your Profile</h1>
                <p class="prompt-subtitle">Add your professional details to personalize your workspace</p>
                
                <form id="profile-form" autocomplete="on">
                    <div class="input-wrapper">
                        <label for="name">Full Name *</label>
                        <input 
                            type="text" 
                            id="name" 
                            name="name" 
                            autocomplete="name"
                            placeholder="e.g. Jane Smith"
                            required
                        >
                    </div>
                    
                    <div class="input-wrapper">
                        <label for="department">Department</label>
                        <input 
                            type="text" 
                            id="department" 
                            name="department" 
                            autocomplete="organization"
                            placeholder="e.g. Digital Industries"
                        >
                    </div>
                    
                    <div class="input-wrapper">
                        <label for="role">Current Role *</label>
                        <input 
                            type="text" 
                            id="role" 
                            name="role" 
                            autocomplete="organization-title"
                            placeholder="e.g. Senior Software Engineer"
                            required
                        >
                    </div>
                    
                    <div class="input-wrapper">
                        <label for="experience_years">Years of Experience</label>
                        <input 
                            type="number" 
                            id="experience_years" 
                            name="experience_years" 
                            min="0"
                            max="50"
                            placeholder="0"
                        >
                    </div>
                    
                    <div class="input-wrapper">
                        <label for="skills">Skills (comma separated)</label>
                        <textarea 
                            id="skills" 
                            name="skills" 
                            placeholder="Python, Kubernetes, React, AWS..."
                            rows="3"
                        ></textarea>
                    </div>
                    
                    <button type="submit" class="_button-login-id" id="save-button">
                        SAVE PROFILE
                    </button>
                    
                    <div class="error-message" id="error-message"></div>
                    <div class="success-message" id="success-message"></div>
                    
                    <div class="ulp-alternate-action">
                        <a href="#" id="skip-link">Skip for now</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footerLinks">
            <a href="https://www.siemens.com/global/en/home.html" target="_blank">Siemens Home</a>
            <a href="https://www.siemens.com/global/en/company.html" target="_blank">Company</a>
            <a href="https://www.siemens.com/global/en/products.html" target="_blank">Products</a>
            <a href="https://www.siemens.com/global/en/services.html" target="_blank">Services</a>
            <a href="https://www.siemens.com/global/en/about.html" target="_blank">About</a>
            <a href="https://www.siemens.com/global/en/careers.html" target="_blank">Careers</a>
        </div>
        <div class="footerInfo">
            &copy; Siemens AG 2024
        </div>
    </footer>

    <script>
        (function() {
            const form = document.getElementById('profile-form');
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');
            const saveButton = document.getElementById('save-button');
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const name = document.getElementById('name').value;
                const department = document.getElementById('department').value;
                const role = document.getElementById('role').value;
                const experience_years = parseInt(document.getElementById('experience_years').value) || 0;
                const skillsRaw = document.getElementById('skills').value;
                const skills = skillsRaw.split(',').map(s => s.trim()).filter(Boolean);
                
                errorMessage.style.display = 'none';
                successMessage.style.display = 'none';
                saveButton.disabled = true;
                saveButton.textContent = 'SAVING...';
                
                try {
                    const response = await fetch('/api/user/profile', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        credentials: 'include',
                        body: JSON.stringify({
                            name,
                            department,
                            role,
                            experience_years,
                            skills,
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (response.ok) {
                        successMessage.textContent = 'Profile saved successfully! Redirecting...';
                        successMessage.style.display = 'block';
                        setTimeout(() => {
                            window.location.href = '/ui/#overview';
                        }, 1000);
                    } else {
                        errorMessage.textContent = data.detail || 'Failed to save profile. Please try again.';
                        errorMessage.style.display = 'block';
                        saveButton.disabled = false;
                        saveButton.textContent = 'SAVE PROFILE';
                    }
                } catch (error) {
                    errorMessage.textContent = 'An error occurred. Please try again later.';
                    errorMessage.style.display = 'block';
                    saveButton.disabled = false;
                    saveButton.textContent = 'SAVE PROFILE';
                }
            });
            
            document.getElementById('skip-link').addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = '/#overview';
            });
        })();
    </script>
</body>
</html>
